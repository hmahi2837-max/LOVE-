<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HASNAIN X VIP</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      min-height: 100vh; 
      overflow-x: hidden; 
      font-family: 'Poppins', sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%);
    }
    .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    .star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; animation: twinkle 3s infinite; }
    @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    
    .title {
      font-family: 'Bebas Neue', cursive; 
      font-size: 5rem; 
      letter-spacing: 8px;
      background: linear-gradient(90deg, #00f5ff, #ff00ff, #00f5ff);
      background-size: 200% auto;
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent;
      animation: neonFlow 3s linear infinite;
      text-shadow: 0 0 30px rgba(0, 245, 255, 0.5);
      margin-bottom: 20px;
    }
    @keyframes neonFlow { to { background-position: 200% center; } }
    
    .subtitle { color: #00f5ff; font-size: 1.2rem; margin-bottom: 40px; text-shadow: 0 0 10px #00f5ff; }
    
    .card-container {
      perspective: 1000px;
      width: 300px;
      height: 300px;
      margin: 20px 0;
      display: none;
    }
    .card-container.show { display: block; }
    
    .card {
      width: 100%; height: 100%; position: relative;
      transform-style: preserve-3d;
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card.flipped { transform: rotateY(180deg); }
    
    .card-face {
      position: absolute; width: 100%; height: 100%;
      backface-visibility: hidden; border-radius: 20px;
      box-shadow: 0 0 40px rgba(0, 245, 255, 0.6), 0 0 80px rgba(255, 0, 255, 0.3);
      overflow: hidden; border: 3px solid transparent;
      background: linear-gradient(#0a0a0f, #0a0a0f) padding-box,
                  linear-gradient(45deg, #00f5ff, #ff00ff) border-box;
    }
    .card-face img { width: 100%; height: 100%; object-fit: cover; }
    .card-back { transform: rotateY(180deg); }
    
    #btn {
      font-family: 'Bebas Neue', cursive;
      padding: 20px 50px; font-size: 1.5rem; letter-spacing: 3px;
      background: linear-gradient(45deg, #00f5ff, #ff00ff);
      border: none; border-radius: 15px; color: #0a0a0f;
      cursor: pointer; margin-top: 30px; font-weight: 700;
      box-shadow: 0 0 30px rgba(0, 245, 255, 0.8), inset 0 0 20px rgba(255,255,255,0.2);
      transition: 0.3s; position: relative; overflow: hidden;
    }
    #btn:before {
      content: ''; position: absolute; top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
      transform: rotate(45deg); animation: shine 3s infinite;
    }
    @keyframes shine { 0% { left: -50%; } 100% { left: 150%; } }
    #btn:hover { transform: scale(1.05) translateY(-3px); box-shadow: 0 0 50px rgba(0, 245, 255, 1); }
    
    #message {
      font-size: 1.8rem; margin: 20px 0; min-height: 60px;
      color: #fff; text-align: center; font-weight: 700;
      text-shadow: 0 0 20px #ff00ff, 0 0 40px #00f5ff;
    }
    .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    .particle { position: absolute; font-size: 1.5rem; animation: particleFloat 3s linear forwards; }
    @keyframes particleFloat { 
      0% { transform: translateY(100vh) rotate(0deg); opacity: 1; } 
      100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; } 
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="particles" id="particles"></div>
  
  <div class="title">HASNAIN</div>
  <div class="subtitle">έγκ VIP EDITION έγκ</div>
  
  <div class="card-container" id="cardContainer">
    <div class="card" id="card">
      <div class="card-face">
        <img src="./pic1.jpg" alt="Pic 1">
      </div>
      <div class="card-face card-back">
        <img src="./pic2.jpg" alt="Pic 2">
      </div>
    </div>
  </div>
  
  <div id="message"></div>
  <button id="btn">START KRO JANI</button>

  <script>
    // Stars background
    const starsDiv = document.getElementById('stars');
    for(let i = 0; i < 100; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 3 + 's';
      starsDiv.appendChild(star);
    }
    
    let clickCount = 0;
    let isShowing = false;
    const btn = document.getElementById('btn');
    const card = document.getElementById('card');
    const cardContainer = document.getElementById('cardContainer');
    const message = document.getElementById('message');
    const particles = document.getElementById('particles');
    
    function createParticles() {
      const emojis = ['έγκ','ΏθΤΟ','ΏθΣΣ','ΏθΦξ','ΏθΤψ','έερ','ΏθΝθ','ΏθΤτ','ΏθοΜ','έζνΎ╕Π'];
      for(let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        p.style.left = Math.random() * 100 + 'vw';
        p.style.animationDelay = Math.random() * 1 + 's';
        particles.appendChild(p);
        setTimeout(() => p.remove(), 3000);
      }
    }
    
    btn.addEventListener('click', () => {
      clickCount++;
      createParticles();
      
      if(clickCount === 1) {
        message.innerHTML = 'TYAR HO JAO JANI ΏθΦξ';
        btn.innerText = 'READY HU';
      } 
      else if(clickCount === 2) {
        message.innerHTML = 'MASHALLAH BOLO PEHLY ΏθβΠέερ';
        btn.innerText = 'MASHALLAH';
      } 
      else if(clickCount === 3) {
        cardContainer.classList.add('show');
        message.innerHTML = 'LE JANI, PIC 1 AA GAYI ΏθΤΟ';
        btn.innerText = 'FLIP KARO';
        isShowing = true;
      }
      else {
        card.classList.toggle('flipped');
        const showingPic2 = card.classList.contains('flipped');
        message.innerHTML = showingPic2 ? 'PIC 2 - SMOOTH FLIP έγκΏθΣΣ' : 'PIC 1 WAPAS ΏθοΜΏθΤψ';
        btn.innerText = 'PHIR FLIP KARO';
      }
    });
  </script>
</body>
</html>
