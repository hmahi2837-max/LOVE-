<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HASNAIN</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
      position: relative;
    }
    
    /* Aurora Background */
    .aurora {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    .aurora-layer {
      position: absolute;
      width: 200%;
      height: 200%;
      animation: auroraMove 20s ease-in-out infinite;
      opacity: 0.6;
      filter: blur(80px);
    }
    .aurora-layer:nth-child(1) {
      background: radial-gradient(circle at 20% 50%, #ff006e 0%, transparent 50%);
      animation-delay: 0s;
    }
    .aurora-layer:nth-child(2) {
      background: radial-gradient(circle at 80% 50%, #3a86ff 0%, transparent 50%);
      animation-delay: 5s;
    }
    .aurora-layer:nth-child(3) {
      background: radial-gradient(circle at 50% 50%, #8338ec 0%, transparent 50%);
      animation-delay: 10s;
    }
    @keyframes auroraMove {
      0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
      33% { transform: translate(-30%, -60%) rotate(120deg); }
      66% { transform: translate(-70%, -40%) rotate(240deg); }
    }
    
    .container {
      position: relative;
      z-index: 10;
      text-align: center;
    }
    
    .name {
      font-family: 'Syncopate', sans-serif;
      font-size: 4.5rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 12px;
      margin-bottom: 10px;
      animation: fadeInDown 1s ease;
      text-shadow: 0 0 40px rgba(255, 255, 255, 0.5);
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-50px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .tagline {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.9rem;
      letter-spacing: 4px;
      margin-bottom: 50px;
      text-transform: uppercase;
    }
    
    /* Glass Card */
    .glass-card {
      width: 320px;
      height: 320px;
      margin: 0 auto 40px;
      position: relative;
      display: none;
      animation: fadeIn 0.8s ease;
    }
    .glass-card.show { display: block; }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s;
    }
    .card-inner.flipped { transform: rotateY(180deg); }
    
    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 30px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4),
                  inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }
    .card-face img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .card-back { transform: rotateY(180deg); }
    
    /* Glass Button */
    #btn {
      font-family: 'Space Grotesk', sans-serif;
      padding: 18px 50px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 2px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50px;
      color: #fff;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    #btn:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(131, 56, 236, 0.4);
    }
    
    #message {
      color: #fff;
      font-size: 1.4rem;
      margin: 30px 0;
      min-height: 40px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      animation: particleUp 4s linear forwards;
      box-shadow: 0 0 10px #fff;
    }
    @keyframes particleUp {
      0% { transform: translateY(100vh) scale(0); opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="aurora">
    <div class="aurora-layer"></div>
    <div class="aurora-layer"></div>
    <div class="aurora-layer"></div>
  </div>
  
  <div class="particles" id="particles"></div>
  
  <div class="container">
    <div class="name">HASNAIN</div>
    <div class="tagline">Premium Edition</div>
    
    <div class="glass-card" id="glassCard">
      <div class="card-inner" id="cardInner">
        <div class="card-face">
          <img src="./pic1.jpg" alt="Hasnain 1">
        </div>
        <div class="card-face card-back">
          <img src="./profile.jpg" alt="Hasnain 2">
        </div>
      </div>
    </div>
    
    <div id="message"></div>
    <button id="btn">Enter</button>
  </div>

  <script>
    let clickCount = 0;
    const btn = document.getElementById('btn');
    const glassCard = document.getElementById('glassCard');
    const cardInner = document.getElementById('cardInner');
    const message = document.getElementById('message');
    const particles = document.getElementById('particles');
    
    function createParticles() {
      for(let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.animationDelay = Math.random() * 2 + 's';
        particles.appendChild(p);
        setTimeout(() => p.remove(), 4000);
      }
    }
    
    btn.addEventListener('click', () => {
      clickCount++;
      createParticles();
      
      if(clickCount === 1) {
        message.innerHTML = 'Welcome to the Premium Zone ✨';
        btn.innerText = 'Continue';
      } 
      else if(clickCount === 2) {
        message.innerHTML = 'Say Mashallah 🙏';
        btn.innerText = 'Mashallah';
      } 
      else if(clickCount === 3) {
        glassCard.classList.add('show');
        message.innerHTML = 'First Look 💎';
        btn.innerText = 'Flip Card';
      } 
      else {
        cardInner.classList.toggle('flipped');
        const isFlipped = cardInner.classList.contains('flipped');
        message.innerHTML = isFlipped ? 'Second View 🔥' : 'First View Back 💫';
        btn.innerText = 'Flip Again';
      }
    });
    
    // 3D Tilt Effect
    glassCard.addEventListener('mousemove', (e) => {
      if(!glassCard.classList.contains('show')) return;
      const rect = glassCard.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;
      const rotateX = (y - centerY) / 10;
      const rotateY = (centerX - x) / 10;
      glassCard.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });
    
    glassCard.addEventListener('mouseleave', () => {
      glassCard.style.transform = 'perspective(1000px) rotateX(0) rotateY(0)';
    });
  </script>
</body>
</html>
